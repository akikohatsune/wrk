name: Build wrk

on:
  push:
  pull_request:

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev git unzip

      - name: Build wrk
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wrk-${{ matrix.os }}
          path: wrk

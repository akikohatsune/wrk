name: Build wrk

on:
  push:
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-ubuntu-macos:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-22.04, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev git unzip perl

      - name: Build wrk
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wrk-${{ matrix.os }}
          path: wrk

  build-arm64:
    name: Build for ARM64 (Android/Termux/iOS)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Cross-Compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-aarch64-linux-gnu g++-aarch64-linux-gnu libssl-dev git unzip perl

      - name: Build wrk for ARM64
        run: |
          make CC=aarch64-linux-gnu-gcc

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wrk-arm64
          path: wrk

  build-arch:
    name: Build on Arch Linux
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel openssl git unzip perl

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wrk
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wrk-archlinux
          path: wrk

  build-rpm:
    name: Build RPM (Fedora)
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y @development-tools openssl-devel git unzip rpm-build perl-FindBin perl-IPC-Cmd perl-File-Compare perl-File-Copy

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build wrk
        run: make

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: wrk-fedora-rpm
          path: wrk
